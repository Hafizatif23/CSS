<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid </title>
</head>
<style>
    .grid{
        width: 80%;
        height: 70vh;
        padding: 10px;
        border: 2px solid black;
        margin: auto;
        display: grid;
        gap: 20px;
        grid-template-areas: 
        "one one one one"
        "two two three three"
        "four five six seven";
    }
    .child1{
        background-color: purple;
        grid-area: one;
        border-radius: 10px;  
        display: flex;
        justify-content: start;
        padding-left: 20px;
        font-size: 50px;
        align-items: center;     

    }

    .child2{
        background-color: rgb(0, 157, 255);
        grid-area: two;
        border-radius: 10px;
    }
    .child3{
        background-color: pink;
        grid-area: three;
        border-radius: 10px;
    }
    .child4{
        background-color: green;
        grid-area: four;
        border-radius: 10px;
    }
    .child5{
        background-color: yellow;
        grid-area: five;
        border-radius: 10px;
    }
    .child6{
        background-color: blue;
        grid-area: six;
        border-radius: 10px;
    }
    .child7{
        background-color: black;
        grid-area: seven;
        border-radius: 10px;
    }
</style>
<body>
    <div class="grid">
        <div class="child1">This is a single column.</div>
        <div class="child2"></div>
        <div class="child3"></div>
        <div class="child4"></div>
        <div class="child5"></div>
        <div class="child6"></div>
        <div class="child7"></div>
        
    </div>
</body>
</html>
